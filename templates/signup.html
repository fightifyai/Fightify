<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>
<body style="background:#0b0b0b;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<form method="POST" style="background:#1a1a1a;padding:20px;border-radius:10px;width:250px;">
    <h2>🥊 Create Account</h2>

    <input name="username" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;">
    <input name="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

    <button style="width:100%;padding:10px;background:red;color:white;border:none;">
        Sign Up
    </button>

    <p style="margin-top:10px;">
        <a href="/" style="color:white;">Login instead</a>
    </p>
</form>

</body>
</html>
