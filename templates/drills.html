<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Drills</title>

<style>
/* TOP BAR */
.top-bar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:15px;
}

.back-btn {
    color:white;
    text-decoration:none;
    font-size:14px;
    opacity:0.7;
    padding:8px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
}

.title {
    font-size:16px;
    font-weight:bold;
    opacity:0.9;
}

/* CARD */
.drill-card {
    background:#141414;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.05);
}

/* VIDEO */
.drill-video {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

/* TEXT */
.drill-title {
    font-size:16px;
    font-weight:bold;
    margin-top:6px;
}

.drill-desc {
    font-size:13px;
    opacity:0.8;
    margin-top:6px;
}

.drill-goal {
    font-size:12px;
    opacity:0.6;
    margin-top:6px;
}

/* BADGES */
.row {
    display:flex;
    gap:6px;
    margin-bottom:8px;
}

.badge {
    font-size:11px;
    padding:4px 8px;
    border-radius:8px;
    background:rgba(255,255,255,0.06);
    opacity:0.8;
}

/* BUTTON */
.drill-btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="drills-container">

<div class="top-bar">
    <a href="/dashboard" class="back-btn">← Back</a>
    <div class="title">Drill Library</div>
</div>

    <h2 style="text-align:center;">🥊 Drill Library</h2>

    {% for drill in drills %}

    <div class="drill-card">

        <!-- 🔥 BADGES ADDED HERE -->
        <div class="row">
            <div class="badge">{{ drill.difficulty }}</div>
            <div class="badge">{{ drill.category }}</div>
        </div>

        <video class="drill-video" autoplay loop muted playsinline>
            <source src="{{ url_for('static', filename=drill.video) }}" type="video/mp4">
        </video>

        <div class="drill-title">{{ drill.name }}</div>

        <div class="drill-desc">
            {{ drill.description }}
        </div>

        <div class="drill-goal">🎯 {{ drill.goal }}</div>

        <form action="/start-drill" method="POST">
            <input type="hidden" name="name" value="{{ drill.name }}">
            <input type="hidden" name="category" value="{{ drill.category }}">
            <input type="hidden" name="rounds" value="{{ drill.rounds }}">

            <button class="drill-btn" type="submit">
                Start Drill
            </button>
        </form>

    </div>

    {% endfor %}

</div>

</body>
</html>
