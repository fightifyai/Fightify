<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🥊 Corner Advice</h1>

<div id="chat" class="chat"></div>
<div class="coach-grid">

    <div class="coach-card" onclick="send('defense')">
        🛡 Defense
    </div>

    <div class="coach-card" onclick="send('offense')">
        💥 Offense
    </div>

    <div class="coach-card" onclick="send('control')">
        🎯 Control
    </div>

</div>

<div style="
    margin-top:15px;
    opacity:0.75;
    font-size:18px;
    text-align:center;
    background:#1a1a1a;
    padding:10px;
    border-radius:12px;
">
    💡 Tip: Ask after sparring for best feedback
</div>

<a href="/dashboard" style="
    display:block;
    text-align:center;
    margin-top:15px;
    padding:12px;
    background:#333;
    color:white;
    border-radius:10px;
    text-decoration:none;
">
← Back to Dashboard
</a>

<script>
async function send(msg){

    let chat = document.getElementById("chat");

    // user message
    chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;

    // scroll down
    chat.scrollTop = chat.scrollHeight;

    // 🧠 typing indicator
    let typing = document.createElement("p");
    typing.id = "typing";
    typing.style.opacity = "0.6";
    typing.innerText = "🥊 Coach is thinking...";
    chat.appendChild(typing);

    chat.scrollTop = chat.scrollHeight;

    // small delay to feel natural
    await new Promise(r => setTimeout(r, 600));

    let res = await fetch("/coach-reply", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    // remove typing
    document.getElementById("typing").remove();

    // coach response
    chat.innerHTML += `
    <div class="coach-response">

        <b style="color:#ff3b3b;">${data.title}</b>

        <p>🟥 <b>Mistake:</b> ${data.mistake}</p>
        <p>🧠 <b>Why:</b> ${data.why}</p>
        <p>🟩 <b>Fix:</b> ${data.fix}</p>
        <p>🥊 <b>Drill:</b> ${data.drill}</p>
        <p>🎯 <b>Cue:</b> ${data.cue}</p>

    </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}
</script>

</div>

</body>
</html>
