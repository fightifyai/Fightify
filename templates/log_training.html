<!DOCTYPE html>
<html>
<head>
    <title>Log Training</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <a href="/dashboard" class="back">← Back</a>

    <div class="card">

        <h2>🥊 Log Training</h2>

        <form method="POST">

            <label>Type</label>
            <select name="type">
                <option>Shadowboxing</option>
                <option>Heavy Bag</option>
                <option>Sparring</option>
                <option>Pads</option>
                <option>Conditioning</option>
                <option>Strength</option>
            </select>

            <label>Duration (minutes)</label>
            <input type="number" name="duration" required>

            <label>Intensity (1-10)</label>
            <input type="number" name="intensity" min="1" max="10" required>

            <label>Notes</label>
            <textarea name="notes"></textarea>

            <button type="submit">Save Training</button>

        </form>

    </div>

</div>

</body>
</html>
